<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Народные тропы</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <aside class="panel">
    <div>Народные тропы</div>

    <label class="control">
      <span>Грубый путь</span>
      <input id="routeResolution" type="range" min="1" max="100" value="8">
      <output id="routeResolutionValue">1:8</output>
    </label>
  </aside>

  <main class="simulation">
    <canvas id="simulationCanvas"></canvas>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
