<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Народные тропы</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <aside class="panel">
    <div>Народные тропы</div>

    <label class="control">
      <span>Грубый путь</span>
      <input id="routeResolution" type="range" min="2" max="50" value="12">
      <output id="routeResolutionValue">1:12</output>
    </label>

    <label class="control">
      <span>Агенты</span>
      <input id="agentCount" type="range" min="0" max="300" value="80">
      <output id="agentCountValue">80</output>
    </label>

    <label class="control">
      <span>Плавность поворота</span>
      <input id="turnSmoothness" type="range" min="0" max="20" value="4" step="0.5">
      <output id="turnSmoothnessValue">4</output>
    </label>

    <label class="control">
      <span>Случайность</span>
      <input id="wanderStrength" type="range" min="0" max="0.5" value="0.18" step="0.01">
      <output id="wanderStrengthValue">0.18</output>
    </label>

    <label class="control">
      <span>Смена случайности</span>
      <input id="wanderChangeRate" type="range" min="0" max="3" value="0.7" step="0.1">
      <output id="wanderChangeRateValue">0.7</output>
    </label>

    <label class="control">
      <span>Плавность случайности</span>
      <input id="wanderBlendRate" type="range" min="0" max="5" value="1.5" step="0.1">
      <output id="wanderBlendRateValue">1.5</output>
    </label>

    <label class="control">
      <span>Дебаг грубого пути</span>
      <input id="routeDebug" type="checkbox" checked>
    </label>
  </aside>

  <main class="simulation">
    <canvas id="simulationCanvas"></canvas>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
